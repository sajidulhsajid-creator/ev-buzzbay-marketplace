<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BuzzBay - EV Charger Marketplace (LoRa Mesh)</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f5f5; }
    .hero { background: linear-gradient(135deg, #1e40af 0%, #0c4a6e 100%); color: white; }
    .btn-primary { background: #2563eb; color: white; padding: 12px 24px; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
    .btn-primary:hover { background: #1e40af; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
    .btn-secondary { background: white; color: #1e40af; padding: 12px 24px; border: 2px solid #2563eb; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
    .btn-secondary:hover { background: #e0e7ff; }
    .card { background: white; border-radius: 12px; padding: 32px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); text-align: center; transition: all 0.3s; }
    .card:hover { transform: translateY(-8px); box-shadow: 0 12px 24px rgba(0,0,0,0.15); }
    .icon { font-size: 48px; margin-bottom: 16px; }
    .pros { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 20px; text-align: left; }
    .pro-item { background: #f0f9ff; padding: 12px; border-radius: 8px; border-left: 4px solid #2563eb; }
    .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .modal-content { background: white; border-radius: 12px; padding: 32px; width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
    .input-group { margin-bottom: 20px; }
    .input-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; }
    .input-group input, .input-group select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
    .input-group input:focus, .input-group select:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 5px rgba(37, 99, 235, 0.3); }
    .success-message { background: #d1fae5; color: #065f46; padding: 16px; border-radius: 8px; margin-top: 16px; border: 1px solid #a7f3d0; }
    .error-message { background: #fee2e2; color: #991b1b; padding: 16px; border-radius: 8px; margin-top: 16px; border: 1px solid #fca5a5; }
    .close-btn { position: absolute; top: 10px; right: 10px; background: none; border: none; font-size: 24px; cursor: pointer; color: #666; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    // Configuration - Update for production
    const API_URL = 'http://localhost:3001/api';
    
    function App() {
      const [userType, setUserType] = React.useState(null);
      const [showModal, setShowModal] = React.useState(false);
      const [message, setMessage] = React.useState('');
      const [loading, setLoading] = React.useState(false);

      const hostPros = [
        '💰 Earn passive income',
        '⚡ Real-time earnings dashboard',
        '📊 Monitor charger status live',
        '🛠️ LoRa mesh network support',
        '📱 Instant notifications',
        '🌍 Join our growing network'
      ];

      const handleHostSignup = async (e) => {
        e.preventDefault();
        setLoading(true);
        const formData = new FormData(e.target);
        
        try {
          // Store host info in backend
          const response = await fetch(`${API_URL}/chargers`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              userId: Math.floor(Math.random() * 10000),
              locationId: formData.get('location'),
              name: formData.get('name'),
              email: formData.get('email'),
              address: formData.get('address'),
              phone: formData.get('phone'),
              chargerType: formData.get('charger_type'),
              maxPower: parseInt(formData.get('charger_type').split('kW')[0])
            })
          });
          
          if (response.ok) {
            setMessage('✅ Application received! We will contact you within 24 hours.');
            setTimeout(() => {
              setShowModal(false);
              setUserType(null);
              e.target.reset();
            }, 3000);
          } else {
            setMessage('❌ Error submitting application. Please try again.');
          }
        } catch (err) {
          setMessage('❌ Connection error. Make sure backend is running at ' + API_URL);
        } finally {
          setLoading(false);
        }
      };

      const handleRenterLogin = () => {
        window.location.href = '/renter.html';
      };

      return (
        <div>
          {/* HEADER */}
          <header style={{ background: 'linear-gradient(135deg, #1e40af 0%, #0c4a6e 100%)', color: 'white', padding: '20px 0' }}>
            <div style={{ maxWidth: '1200px', margin: '0 auto', padding: '0 20px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
              <h1 style={{ fontSize: '28px', fontWeight: 'bold' }}>⚡ BuzzBay</h1>
              <nav style={{ display: 'flex', gap: '24px' }}>
                <a href="#home" style={{ color: 'white', textDecoration: 'none' }}>Home</a>
                <a href="#how" style={{ color: 'white', textDecoration: 'none' }}>How it Works</a>
                <a href="#" style={{ color: 'white', textDecoration: 'none' }}>Contact</a>
              </nav>
            </div>
          </header>

          {/* HERO SECTION */}
          <section className="hero" style={{ textAlign: 'center', padding: '80px 20px' }}>
            <div style={{ maxWidth: '1000px', margin: '0 auto' }}>
              <h2 style={{ fontSize: '48px', fontWeight: 'bold', marginBottom: '20px' }}>
                ⚡ The Future of EV Charging
              </h2>
              <p style={{ fontSize: '20px', marginBottom: '40px', opacity: 0.9 }}>
                Join the LoRa-powered EV charging network. Hosts earn money, Renters find chargers instantly.
              </p>
              <div style={{ display: 'flex', gap: '20px', justifyContent: 'center', flexWrap: 'wrap' }}>
                <button 
                  className="btn-primary"
                  onClick={() => {
                    setUserType('host');
                    setShowModal(true);
                  }}
                >
                  🏠 I'm a Host
                </button>
                <button 
                  className="btn-secondary"
                  onClick={handleRenterLogin}
                >
                  🚗 I'm a Renter
                </button>
              </div>
            </div>
          </section>

          {/* FEATURES */}
          <section style={{ maxWidth: '1200px', margin: '60px auto', padding: '0 20px' }}>
            <h2 style={{ fontSize: '36px', fontWeight: 'bold', textAlign: 'center', marginBottom: '50px', color: '#1e40af' }}>
              Why Choose BuzzBay?
            </h2>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(250px, 1fr))', gap: '30px' }}>
              <div className="card">
                <div className="icon">🌐</div>
                <h3>LoRa Network</h3>
                <p>Connected via distributed LoRa mesh for reliable, low-power communication across wide areas.</p>
              </div>
              <div className="card">
                <div className="icon">📊</div>
                <h3>Real-Time Data</h3>
                <p>Live charger status, temperature, power delivery, and availability updates every 5 seconds.</p>
              </div>
              <div className="card">
                <div className="icon">💰</div>
                <h3>Smart Pricing</h3>
                <p>Dynamic pricing based on electricity rates and charger power capacity. Transparent billing.</p>
              </div>
              <div className="card">
                <div className="icon">🔒</div>
                <h3>Secure Bookings</h3>
                <p>Encrypted unlock codes sent directly to your phone. No physical keys needed.</p>
              </div>
              <div className="card">
                <div className="icon">📱</div>
                <h3>Mobile Ready</h3>
                <p>Book on the go. Live map shows all available chargers near you in real-time.</p>
              </div>
              <div className="card">
                <div className="icon">⚙️</div>
                <h3>IoT Enabled</h3>
                <p>Full integration with Arduino, ESP32, and OpenEVSE chargers. Scalable to thousands.</p>
              </div>
            </div>
          </section>

          {/* HOST MODAL */}
          {showModal && userType === 'host' && (
            <div className="modal" onClick={() => setShowModal(false)}>
              <div className="modal-content" onClick={e => e.stopPropagation()}>
                <button className="close-btn" onClick={() => setShowModal(false)}>✕</button>
                <h2 style={{ marginBottom: '30px', color: '#1e40af', fontSize: '24px' }}>Become a BuzzBay Host</h2>
                
                <form onSubmit={handleHostSignup}>
                  <div className="input-group">
                    <label>Full Name</label>
                    <input type="text" name="name" required />
                  </div>
                  
                  <div className="input-group">
                    <label>Email Address</label>
                    <input type="email" name="email" required />
                  </div>
                  
                  <div className="input-group">
                    <label>Address</label>
                    <input type="text" name="address" placeholder="Street, Suburb, State, Postcode" required />
                  </div>
                  
                  <div className="input-group">
                    <label>Phone Number</label>
                    <input type="tel" name="phone" required />
                  </div>
                  
                  <div className="input-group">
                    <label>Charger Type</label>
                    <select name="charger_type" required>
                      <option value="">Select charger type</option>
                      <option value="7kW">7.4 kW (Single Phase) - Home</option>
                      <option value="11kW">11 kW (Three Phase) - Home/Business</option>
                      <option value="22kW">22 kW (Three Phase) - Public</option>
                      <option value="50kW">50 kW (DC Fast) - Commercial</option>
                    </select>
                  </div>

                  <div className="input-group">
                    <label>Location ID</label>
                    <select name="location" required>
                      <option value="">Select location</option>
                      <option value="locationA">Location A (LoRa Node A)</option>
                      <option value="locationB">Location B (LoRa Node B)</option>
                      <option value="locationC">Location C (LoRa Node C)</option>
                    </select>
                  </div>

                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '10px' }}>
                    <div className="pro-item">
                      <strong>Earnings</strong>
                      <p>$2.50/hour on average</p>
                    </div>
                    <div className="pro-item">
                      <strong>Uptime</strong>
                      <p>99.9% network reliability</p>
                    </div>
                  </div>
                  
                  {message && (
                    <div className={message.includes('✅') ? 'success-message' : 'error-message'}>
                      {message}
                    </div>
                  )}
                  
                  <button 
                    type="submit" 
                    className="btn-primary" 
                    style={{ width: '100%', marginTop: '20px' }}
                    disabled={loading}
                  >
                    {loading ? 'Processing...' : 'Submit Application'}
                  </button>
                </form>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
